name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync environment
        run: uv sync --group test --locked

      - name: Check formatting
        run: uv run --group test ruff format --check src tests

      - name: Lint
        run: uv run --group test ruff check src tests

      - name: Test
        run: uv run --group test pytest tests -q

      - name: Self harness
        run: uv run --group test python-project-harness .

      - name: Agent snapshot
        run: uv run --group test python-project-harness --agent-snapshot .

      - name: Build package
        run: uv build

      - name: Check diff hygiene
        run: git diff --check
