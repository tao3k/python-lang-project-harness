id = "python-control-flow-v1"
title = "Python control-flow and native-idiom findings are reproducible"
policy_ids = ["PYTHON-AGENT-CONTROL-FLOW-001", "PYTHON-AGENT-NATIVE-IDIOM-001"]
agent_goal = "Force agents to split nested public algorithms and native-idiom boilerplate before editing Python behavior."
reference_repositories = ["python/cpython"]
reference_patterns = [
  "Public algorithm shape is exposed through guard clauses or table dispatch",
  "Native transformations use comprehensions, generator expressions, or named helpers instead of manual loops",
]
inputs = "inputs"
expected = "expect"

[policy_trigger]
kind = "software-criterion"
trigger = "pytest software criterion JSON receipt reads inputs/criterion.py and compares expect/findings.json"
evidence = "expect/findings.json"
expected_rule_ids = ["PY-AGENT-POLICY-009", "PY-AGENT-POLICY-010", "PY-AGENT-POLICY-011"]
expected_criteria = [
  "control-flow.decision-stack",
  "control-flow.literal-dispatch-chain",
  "control-flow.traversal-knot",
  "control-flow.broad-linear-phase",
  "native-idiom.manual-transform-loop",
]
agent_failure_mode = "AI agent leaves nested decision stacks, broad phases, and manual transform loops in place, producing redundant low-quality edits."
expected_resolution = "Split the broad algorithm into named helpers, expose dispatch explicitly, and replace manual transforms with Python-native idioms."
